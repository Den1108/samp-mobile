name: Android Build Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Создаём local.properties с секретами из GitHub Secrets
    # Чтобы это работало, добавь в Settings → Secrets → Actions:
    #   KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
    # А сам .jks файл закодируй в base64 и добавь как секрет KEYSTORE_BASE64
    - name: Create local.properties from secrets
      run: |
        echo "KEYSTORE_FILE=FlytMobile-release-key.jks" >> local.properties
        echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties

    # Декодируем keystore из base64 секрета в файл
    - name: Decode keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/FlytMobile-release-key.jks

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/*.apk
